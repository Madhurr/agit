name: agit PR Context

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  agit-context:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch agit notes
        run: git fetch origin refs/notes/agit:refs/notes/agit 2>/dev/null || true

      - name: Generate PR comment
        id: context
        run: |
          COMMITS=$(git log --format="%H" origin/${{ github.base_ref }}..${{ github.event.pull_request.head.sha }} 2>/dev/null || git log --format="%H" -10)

          BODY=""
          TOTAL=0
          WITH_NOTES=0

          for SHA in $COMMITS; do
            TOTAL=$((TOTAL + 1))
            NOTE=$(git notes --ref=agit show $SHA 2>/dev/null) || continue
            [ -z "$NOTE" ] && continue
            WITH_NOTES=$((WITH_NOTES + 1))

            SHORT=${SHA:0:7}
            SUBJ=$(git log -1 --format="%s" $SHA)
            INTENT=$(echo "$NOTE" | jq -r '.intent // empty')
            CONF=$(echo "$NOTE" | jq -r '.confidence // 0')
            CONF_RAT=$(echo "$NOTE" | jq -r '.confidence_rationale // empty')
            TASK=$(echo "$NOTE" | jq -r '.task // empty')
            AID=$(echo "$NOTE" | jq -r '.agent.id // empty')
            AMOD=$(echo "$NOTE" | jq -r '.agent.model // empty')

            PCT=$(echo "$CONF * 100" | bc | cut -d. -f1)
            [ "$PCT" -ge 80 ] 2>/dev/null && CEMO="🟢" || { [ "$PCT" -ge 50 ] 2>/dev/null && CEMO="🟡" || CEMO="🔴"; }

            BODY+="### \`${SHORT}\` ${SUBJ}\n\n"

            # Info table
            BODY+="| | |\n|---|---|\n"
            if [ "$PCT" != "0" ] && [ -n "$PCT" ]; then
              CLINE="$CEMO ${PCT}%"
              [ -n "$CONF_RAT" ] && CLINE="$CLINE — *\"${CONF_RAT}\"*"
              BODY+="| **Confidence** | ${CLINE} |\n"
            fi
            [ -n "$AMOD" ] && BODY+="| **Agent** | ${AID} (${AMOD}) |\n"
            [ -n "$TASK" ] && BODY+="| **Task** | ${TASK} |\n"
            BODY+="\n"

            [ -n "$INTENT" ] && BODY+="**Intent:** ${INTENT}\n\n"

            # Alternatives
            ACNT=$(echo "$NOTE" | jq '.alternatives_considered | length')
            if [ "$ACNT" -gt 0 ]; then
              BODY+="**Alternatives rejected:**\n"
              for i in $(seq 0 $((ACNT - 1))); do
                AP=$(echo "$NOTE" | jq -r ".alternatives_considered[$i].approach")
                RJ=$(echo "$NOTE" | jq -r ".alternatives_considered[$i].rejected_reason")
                BODY+="- ✗ ${AP} — ${RJ}\n"
              done
              BODY+="\n"
            fi

            # Key decisions
            KCNT=$(echo "$NOTE" | jq '.key_decisions | length')
            if [ "$KCNT" -gt 0 ]; then
              BODY+="**Key decisions:**\n"
              for i in $(seq 0 $((KCNT - 1))); do
                KD=$(echo "$NOTE" | jq -r ".key_decisions[$i].decision")
                KR=$(echo "$NOTE" | jq -r ".key_decisions[$i].rationale")
                BODY+="- ${KD}: ${KR}\n"
              done
              BODY+="\n"
            fi

            # Risks
            RCNT=$(echo "$NOTE" | jq '.risks | length')
            if [ "$RCNT" -gt 0 ]; then
              BODY+="**⚠️ Risks:**\n"
              for i in $(seq 0 $((RCNT - 1))); do
                SV=$(echo "$NOTE" | jq -r ".risks[$i].severity")
                AR=$(echo "$NOTE" | jq -r ".risks[$i].area")
                DS=$(echo "$NOTE" | jq -r ".risks[$i].description")
                case $SV in high) RE="🔴";; medium) RE="🟡";; *) RE="🟢";; esac
                BODY+="- ${RE} **[${SV}]** ${AR} — ${DS}\n"
              done
              BODY+="\n"
            fi

            # Unknowns
            UCNT=$(echo "$NOTE" | jq '.unknowns | length')
            if [ "$UCNT" -gt 0 ]; then
              BODY+="**❓ Unknowns:**\n"
              for i in $(seq 0 $((UCNT - 1))); do
                UNK=$(echo "$NOTE" | jq -r ".unknowns[$i]")
                BODY+="- ${UNK}\n"
              done
              BODY+="\n"
            fi

            # Ripple effects
            PCNT=$(echo "$NOTE" | jq '.ripple_effects | length')
            if [ "$PCNT" -gt 0 ]; then
              BODY+="**👀 Ripple effects:**\n"
              for i in $(seq 0 $((PCNT - 1))); do
                RP=$(echo "$NOTE" | jq -r ".ripple_effects[$i]")
                BODY+="- ${RP}\n"
              done
              BODY+="\n"
            fi

            # Test results
            if echo "$NOTE" | jq -e '.test_results' >/dev/null 2>&1; then
              TP=$(echo "$NOTE" | jq -r '.test_results.passed // 0')
              TF=$(echo "$NOTE" | jq -r '.test_results.failed // 0')
              TS=$(echo "$NOTE" | jq -r '.test_results.skipped // 0')
              BODY+="**Tests:** ✅ ${TP} passed, ❌ ${TF} failed, ⏭️ ${TS} skipped\n\n"
            fi

            BODY+="---\n\n"
          done

          if [ "$WITH_NOTES" -eq 0 ]; then
            echo "has_notes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Build final comment
          {
            echo "<!-- agit-context -->"
            echo ""
            echo "## 🤖 Agent Context"
            echo ""
            echo "**${WITH_NOTES}/${TOTAL} commits have agent context** · powered by [agit](https://github.com/Madhurr/agit)"
            echo ""
            echo "---"
            echo ""
            printf "%b" "$BODY"
          } > /tmp/agit-comment.md

          echo "has_notes=true" >> $GITHUB_OUTPUT

      - name: Post or update PR comment
        if: steps.context.outputs.has_notes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/agit-comment.md', 'utf8');
            const marker = '<!-- agit-context -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
