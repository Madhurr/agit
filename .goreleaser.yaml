version: 2

project_name: agit

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: agit
    main: .
    binary: agit
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    # Reproducible builds: override build time so same source = same binary hash
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: agit
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - AGENTS.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Sign checksums.txt with cosign (keyless, GitHub Actions OIDC)
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    signature: "${artifact}.sig"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

# SBOM per binary
sboms:
  - artifacts: binary
    args: ["$artifact", "--file", "$document", "--output", "cyclonedx-json"]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: Madhurr
    name: agit
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  extra_files:
    - glob: "*.sig"
    - glob: "*.pem"

